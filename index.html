        // 获取热门帖子（带 60 秒缓存）
        async function getCachedHotPosts() {
            const now = Date.now();
            if (hotPostsCache && now - hotPostsCacheTime < 60000) {
                return hotPostsCache;
            }
            const { data, error } = await supabaseClient.rpc('get_hot_posts', { p_limit: 30 });
            if (error) throw error;
            hotPostsCache = data || [];
            hotPostsCacheTime = now;
            return hotPostsCache;
        }

        // 为当前批次挑选 1-2 个不重复的热门帖子
        async function pickHotPostsForBatch(newPosts) {
            const hotList = await getCachedHotPosts();
            if (!hotList || hotList.length === 0) return [];
            const existingIds = new Set(newPosts.map(p => p.id));
            document.querySelectorAll('.post-card').forEach(el => {
                const m = (el.getAttribute('onclick') || '').match(/navigateDetail\('(.+?)'\)/);
                if (m) existingIds.add(m[1]);
            });
            const availableHot = hotList.filter(h => !existingIds.has(h.id));
            if (availableHot.length === 0) return [];
            const count = Math.min(availableHot.length, Math.random() < 0.5 ? 1 : 2);
            const picked = [];
            for (let i = 0; i < count; i++) {
                const idx = Math.floor(Math.random() * availableHot.length);
                picked.push(availableHot.splice(idx, 1)[0]);
            }
            return picked.map(p => ({
                ...p,
                is_hot: true,
                profiles: { id: p.user_id, username: p.username, avatar_url: p.avatar_url }
            }));
        }

        // 图片 URL 处理（当前直接返回原图；Image Transformation 为付费功能，未开启时会 404）
        function getResizedImageUrl(url, width = 600) {
            if (!url) return url;
            // Supabase Image Transformation 在部分套餐下是灰色不可用的付费功能，
            // 使用 /render/image/ 会导致 404，因此直接返回原图 URL。
            // 如需开启压缩，请先在 Supabase Storage 设置中启用 Image Transformation。
            return url;
        }

        // 随机帖子封面背景色
        function getRandomCoverColor() {
            const colors = [
                'linear-gradient(135deg, #E6F0FF 0%, #B3D9FF 100%)',
                'linear-gradient(135deg, #FFE6F0 0%, #FFB3D9 100%)',
                'linear-gradient(135deg, #F0FFE6 0%, #B3FF99 100%)',
                'linear-gradient(135deg, #FFF0E6 0%, #FFD9B3 100%)',
                'linear-gradient(135deg, #F3E6FF 0%, #D9B3FF 100%)',
                'linear-gradient(135deg, #E6FFF0 0%, #B3FFD9 100%)',
                'linear-gradient(135deg, #FFE6E6 0%, #FFB3B3 100%)',
                'linear-gradient(135deg, #FFFFE6 0%, #FFFFB3 100%)'
            ];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        // 渲染带骨架屏的懒加载图片
        // placeholderText: 若提供，未加载完成时显示该文字占位（随机背景色），否则显示转圈
        function renderLazyImg(src, alt, fullUrl, minHeight, placeholderText) {
            if (!src) return '';
            const onclick = fullUrl ? `onclick="openImagePreview('${fullUrl}', event)"` : '';
            const heightStyle = minHeight ? `style="min-height:${minHeight}px"` : '';
            const placeholderHtml = placeholderText
                ? `<div class="lazy-img-placeholder" style="background:${getRandomCoverColor()}" data-placeholder><span>${placeholderText}</span></div>`
                : `<div class="lazy-img-spinner"></div>`;
            return `
                <div class="lazy-img-wrap" ${heightStyle}>
                    ${placeholderHtml}
                    <img src="${src}" alt="${alt || ''}" ${onclick} loading="lazy" decoding="async" onload="this.classList.add('loaded'); this.closest('.lazy-img-wrap').classList.add('loaded');" onerror="this.closest('.lazy-img-wrap').classList.add('loaded'); this.style.opacity='0.2';">
                </div>
            `;
        }

        // 统一渲染一张帖子卡片（兼容 RPC 平铺字段 与 嵌套 profiles 字段）
        function renderPostCard(post) {
            const rawCover = (post.thumbnail_urls && post.thumbnail_urls.length > 0) ? post.thumbnail_urls[0] : (post.image_urls && post.image_urls.length > 0 ? post.image_urls[0] : null);
            const cover = getResizedImageUrl(rawCover, 600);
            const authorId = post.author_id || post.profiles?.id || '';
            const authorName = post.username || post.profiles?.username || '匿名';
            const firstChar = authorName.charAt(0);
            const authorAvatar = getResizedImageUrl(post.avatar_url || post.profiles?.avatar_url, 120);
            const hotBadge = post.is_hot ? '<span style="position:absolute;top:8px;right:8px;background:linear-gradient(135deg,#FF6B6B,#FF4757);color:white;font-size:11px;font-weight:600;padding:3px 8px;border-radius:10px;z-index:1;">🔥 热门</span>' : '';
            const typeBadge = getContentTypeBadge(post) ? `<span style="position:absolute;top:8px;left:8px;z-index:1;">${getContentTypeBadge(post)}</span>` : '';
            return `
                <div class="post-card" onclick="navigateDetail('${post.id}')" style="position:relative;">
                    ${hotBadge}
                    ${typeBadge}
                    ${cover ? renderLazyImg(cover, post.title, null, 200, post.title) : `<div class="no-image"><span>${post.title}</span></div>`}
                    <div class="card-body">
                        ${cover ? `<div class="card-title">${post.title}</div>` : ''}
                        <div class="card-footer">
                            <div class="card-author" onclick="navigateUserPage('${authorId}', event)">
                                ${authorAvatar ? `<div class="mini-avatar"><img src="${authorAvatar}" alt="" loading="lazy" decoding="async"></div>` : `<div class="mini-avatar">${firstChar}</div>`}
                                <span>${authorName}</span>
                            </div>
                            <span>❤️ ${post.likes_count || 0}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // 加载更多帖子（分页追加）
        async function loadMorePosts() {
            if (homePostsLoading) return;
            homePostsLoading = true;
            const myToken = homeLoadToken;

            const homeContent = document.getElementById('home-content');

            // 首次加载显示 spinner；后续加载把底部提示换成 spinner
            if (homeOffset === 0) {
                homeContent.innerHTML = spinner();
            } else {
                const tip = document.getElementById('home-load-more-tip');
                if (tip) tip.innerHTML = spinner().replace('<div style="text-align:center;padding:20px;">', '').replace('</div>', '');
            }

            // 按发布时间倒序查询帖子（排除被隐藏的帖子）
            const hiddenIds = await getHiddenPostIds();
            let query = supabaseClient.from('posts')
                .select('*, profiles:user_id(id, username, avatar_url)')
                .order('created_at', { ascending: false })
                .range(homeOffset, homeOffset + HOME_PAGE_SIZE - 1);
            if (hiddenIds.length > 0) query = query.not('id', 'in', `(${hiddenIds.join(',')})`);
            const { data: posts, error } = await query;

            if (myToken !== homeLoadToken) { homePostsLoading = false; return; }

            if (error) {
                if (homeOffset === 0) {
                    homeContent.innerHTML = `<div class="empty">加载失败：${error.message}<br><button class="btn btn-outline" style="margin-top:12px;" onclick="loadPosts()">重试</button></div>`;
                }
                homePostsLoading = false;
                return;
            }

            if (!posts || posts.length === 0) {
                if (homeOffset === 0) {
                    homeContent.innerHTML = `<div class="empty">暂无帖子，快点击底部 + 发布第一个吧！</div>`;
                } else {
                    const tip = document.getElementById('home-load-more-tip');
                    if (tip) tip.innerHTML = '没有更多内容了';
                }
                homePostsLoading = false;
                return;
            }

            homeOffset += posts.length;

            // 随机取1-2个热门帖子插入到当前批次中（使用缓存，减少重复请求）
            let finalPosts = [...posts];
            try {
                const hotPosts = await pickHotPostsForBatch(posts);
                if (hotPosts.length > 0) {
                    hotPosts.forEach(hp => {
                        const insertAt = Math.floor(Math.random() * (finalPosts.length + 1));
                        finalPosts.splice(insertAt, 0, hp);
                    });
                }
            } catch (e) {}

            // 渲染
            if (homeOffset === posts.length) {
                // 首次加载
                homeContent.innerHTML = '<div class="masonry">' + finalPosts.map(renderPostCard).join('') + '</div>';
            } else {
                // 追加到已有列表
                const masonry = homeContent.querySelector('.masonry');
                if (masonry) {
                    masonry.insertAdjacentHTML('beforeend', finalPosts.map(renderPostCard).join(''));
                }
            }

            // 更新加载提示
            const oldTip = document.getElementById('home-load-more-tip');
            if (oldTip) oldTip.remove();
            if (posts.length >= HOME_PAGE_SIZE) {
                homeContent.insertAdjacentHTML('beforeend',
                    '<div id="home-load-more-tip" style="text-align:center;padding:24px 18px 6px;color:#0066FF;font-size:14px;">继续上滑加载更多 ⬇️</div>'
                );
            } else {
                homeContent.insertAdjacentHTML('beforeend',
                    '<div id="home-load-more-tip" style="text-align:center;padding:24px 18px 6px;color:#888;font-size:14px;">没有更多内容了</div>'
                );
            }

            homePostsLoading = false;
        }

        // 滚动到底部自动刷新主页内容
        function setupHomeScrollListener() {
            let scrollTimer = null;
            window.addEventListener('scroll', () => {
                if (scrollTimer) clearTimeout(scrollTimer);
                scrollTimer = setTimeout(() => {
                    const scrollY = window.scrollY || window.pageYOffset;
                    const visibleH = window.innerHeight;
                    const docH = document.documentElement.scrollHeight;
                    const current = document.querySelector('.page:not(.hidden)');
                    if (!current) return;
                    // 主页：滑到底部加载更多帖子
                    if (current.id === 'page-home' && currentHomeTab === 'latest') {
                        if (scrollY + visibleH >= docH - 100) {
                            loadMorePosts();
                        }
                    }
                    // 分区页面：滑到底部加载更多
                    if (current.id === 'page-category') {
                        if (scrollY + visibleH >= docH - 300) {
                            loadMoreCategoryPosts();
                        }
                    }
                }, 300);
            });
        }
        setupHomeScrollListener();

        // 热榜置顶判断：用户名为"楚楚"且正文含"呵呵哒"
        function isHotPinned(username, content) {
            return !!content && content.includes('呵呵哒') && username === '楚楚';
        }

        // 热榜
        async function loadHotPosts() {
            const homeContent = document.getElementById('home-content');
            homeContent.innerHTML = spinner();

            // 优先用数据库综合指数排序，失败则回退到前端排序
            const { data: rpcPosts, error: rpcError } = await supabaseClient.rpc('get_hot_posts', { p_limit: 30 });
            let posts;
            if (!rpcError && rpcPosts) {
                posts = rpcPosts.map(p => ({
                    ...p,
                    is_pinned: isHotPinned(p.username, p.content),
                    profiles: { id: p.user_id, username: p.username, avatar_url: p.avatar_url }
                }));
            } else {
                const hiddenIds = await getHiddenPostIds();
                const since = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
                let query = supabaseClient.from('posts')
                    .select('*, profiles:user_id(id, username, avatar_url)')
                    .gte('created_at', since)
                    .limit(100);
                if (hiddenIds.length > 0) query = query.not('id', 'in', `(${hiddenIds.join(',')})`);
                const { data, error } = await query;
                if (error) { homeContent.innerHTML = `<div class="empty">加载失败：${error.message}</div>`; return; }
                posts = (data || []).map(p => ({
                    ...p,
                    hot_score: (p.views || 0) * 1 + (p.likes_count || 0) * 10 + (p.comments_count || 0) * 20,
                    is_pinned: isHotPinned(p.profiles?.username, p.content)
                })).sort((a, b) => (b.is_pinned - a.is_pinned) || (b.hot_score - a.hot_score)).slice(0, 30);
            }

            if (!posts || posts.length === 0) { homeContent.innerHTML = `<div class="empty">暂无今日热榜内容</div>`; return; }

            const pinned = posts.filter(p => p.is_pinned);
            const normal = posts.filter(p => !p.is_pinned);

            const renderItem = (post, rankHtml, rankClass, extraClass) => {
                const cover = getResizedImageUrl((post.thumbnail_urls && post.thumbnail_urls.length > 0) ? post.thumbnail_urls[0] : (post.image_urls && post.image_urls.length > 0 ? post.image_urls[0] : null), 240);
                const authorName = post.profiles?.username || '匿名';
                return `
                    <div class="hot-item ${extraClass}" onclick="navigateDetail('${post.id}')">
                        <div class="hot-rank ${rankClass}">${rankHtml}</div>
                        ${cover ? renderLazyImg(cover, post.title, null, null) : `<div class="hot-no-thumb"><span>${post.title}</span></div>`}
                        <div class="hot-info">
                            <div class="hot-title">${post.title}${getContentTypeBadge(post)}</div>
                            <div class="hot-desc">${getListContentPreview(post)}</div>
                            <div class="hot-meta">
                                <span>${authorName}</span>
                                <span>👁 ${post.views || 0}</span>
                                <span>❤️ ${post.likes_count || 0}</span>
                                <span>💬 ${post.comments_count || 0}</span>
                            </div>
                        </div>
                    </div>
                `;
            };

            let html = '<div class="hot-list">';

            if (pinned.length > 0) {
                html += '<div class="hot-section-header">↑ 置顶</div>';
                pinned.forEach(post => {
                    html += renderItem(post, '↑', 'pinned', 'pinned');
                });
                html += '<div class="hot-section-header">🔥 今日热榜</div>';
            }
            normal.forEach((post, index) => {
                const rank = index + 1;
                const rankClass = rank <= 3 ? `top${rank}` : '';
                html += renderItem(post, rank, rankClass, '');
            });
            html += '</div>';

            homeContent.innerHTML = html;
        }

        // 精选帖子

        // 评论渲染：顶级评论为父，所有子孙回复平级放在父评论内
        function renderCommentsTree(comments) {
            const byId = {};
            comments.forEach(c => { byId[c.id] = c; });

            // 找出所有顶级评论（无 parent_id 或 parent_id 不在列表中）
            const roots = comments.filter(c => !c.parent_id || !byId[c.parent_id]);

            // 对每个顶级评论，收集其所有子孙回复（平级）
            function collectDescendants(rootId, acc) {
                comments.forEach(c => {
                    if (c.parent_id === rootId) {
                        acc.push(c);
                        collectDescendants(c.id, acc);
                    }
                });
                return acc;
            }

            return roots.map(root => {
                const replies = collectDescendants(root.id, []);
                return renderCommentFlat(root, null, '', replies, byId);
            }).join('');
        }

        function renderCommentFlat(node, parentName, parentId, replies, byId) {
            const cName = node.profiles?.username || '匿名';
            const cAvatar = node.profiles?.avatar_url;
            const cChar = cName.charAt(0);
            const canDelete = currentUser && node.user_id === currentUser.id;
            const replyToHTML = parentName
                ? `<span class="reply-arrow"> -> <b onclick="navigateUserPage('${parentId}', event)" style="cursor:pointer;color:#0066FF;">${escapeHtml(parentName)}</b></span>`
                : '';

            // 子回复平级渲染，带展开/折叠按钮（默认折叠）
            const replyCount = replies ? replies.length : 0;
            const childrenId = `children-${node.id}`;
            const toggleBtnHTML = replyCount > 0
                ? `<button class="toggle-replies-btn" onclick="toggleReplies('${node.id}')"><span id="toggle-icon-${node.id}">展开</span> ${replyCount}条回复</button>`
                : '';
            const repliesHTML = replyCount > 0
                ? `<div class="comment-children collapsed" id="${childrenId}">${replies.map(r => {
                    const parent = r.parent_id && byId[r.parent_id] ? byId[r.parent_id] : null;
                    const pName = parent ? (parent.profiles?.username || '匿名') : '';
                    const pId = parent ? (parent.profiles?.id || '') : '';
                    return renderCommentFlat(r, pName, pId, [], byId);
                }).join('')}</div>`
                : '';

            return `
                <div class="comment-item" id="comment-${node.id}">
                    ${cAvatar ? `<div class="comment-avatar"><img src="${getResizedImageUrl(cAvatar, 120)}" alt="" loading="lazy" decoding="async"></div>` : `<div class="comment-avatar">${cChar}</div>`}
                    <div class="comment-body">
                        <div style="display:flex;align-items:center;gap:6px;">
                            <div class="comment-author" onclick="navigateUserPage('${node.profiles?.id}', event)">${cName}</div>
                            ${replyToHTML}
                            ${canDelete ? `<span class="comment-delete" onclick="deleteComment('${node.id}', event)">删除</span>` : ''}
                        </div>
                        <div class="comment-text">${escapeHtml(node.content)}</div>
                        ${(node.image_urls && node.image_urls.length > 0) ? `
                            <div class="comment-images">
                                ${(node.thumbnail_urls && node.thumbnail_urls.length > 0 ? node.thumbnail_urls : node.image_urls).map((url, i) => renderLazyImg(getResizedImageUrl(url, 400), '评论图片', node.image_urls[i] || url, null)).join('')}
                            </div>
                        ` : ''}
                        <div class="comment-actions">
                            <span class="comment-time">${formatTime(node.created_at)}</span>
                            ${currentUser ? `<button class="comment-action-btn" onclick="showReplyInput('${node.id}')">回复</button>` : ''}
                        </div>
                        <div id="reply-area-${node.id}" class="reply-area-wrapper"></div>
                        ${toggleBtnHTML}
                        ${repliesHTML}
                    </div>
                </div>
            `;
        }

        function toggleReplies(commentId) {
            const children = document.getElementById('children-' + commentId);
            const icon = document.getElementById('toggle-icon-' + commentId);
            if (!children) return;
            if (children.classList.contains('collapsed')) {
                children.classList.remove('collapsed');
                if (icon) icon.textContent = '收起';
            } else {
                children.classList.add('collapsed');
                if (icon) icon.textContent = '展开';
            }
        }

        function scrollToComment(commentId) {
            const target = document.getElementById('comment-' + commentId);
            if (!target) return;
            let parent = target.parentElement;
            while (parent) {
                if (parent.classList && parent.classList.contains('comment-children') && parent.classList.contains('collapsed')) {
                    parent.classList.remove('collapsed');
                    const match = parent.id.match(/^children-(.+)$/);
                    if (match) {
                        const icon = document.getElementById('toggle-icon-' + match[1]);
                        if (icon) icon.textContent = '收起';
                    }
                }
                parent = parent.parentElement;
            }
            setTimeout(() => {
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                target.classList.add('comment-highlight');
                setTimeout(() => target.classList.remove('comment-highlight'), 2500);
            }, 100);
        }

        async function loadPollData(postId, options) {
            const container = document.getElementById('poll-container');
            if (!container) return;
            const voteCounts = [0, 0];
            let myVote = null;
            try {

        // 清理 NULL 字符和未配对的 surrogate，避免 PostgreSQL JSON 解析报 "unsupported Unicode escape"
        function sanitizeText(str) {
            if (!str) return str;
            let out = '';
            for (let i = 0; i < str.length; i++) {
                const code = str.charCodeAt(i);
                if (code === 0) continue;
                if (code >= 0xD800 && code <= 0xDBFF) {
                    if (i + 1 < str.length) {
                        const next = str.charCodeAt(i + 1);
                        if (next >= 0xDC00 && next <= 0xDFFF) {
                            out += str[i] + str[i + 1];
                            i++;
                        }
                    }
                    continue;
                }
                if (code >= 0xDC00 && code <= 0xDFFF) continue;
                out += str[i];
            }
            return out;
        }

        function autoResizeFrame(frame) {
            // HTML 预览框固定 300px，不随内容变化

        // 动态校准 HTML 预览 iframe 宽度：加载后把容器实际宽度通知 iframe 内部
        function adjustHtmlFrameWidth(iframeId, wrapperId) {
            const frame = document.getElementById(iframeId);
            const wrap = document.getElementById(wrapperId);
            if (!frame || !wrap || frame.dataset.htmlFrameAdjusted) return;
            frame.dataset.htmlFrameAdjusted = '1';

            const sendWidth = () => {
                const width = wrap.clientWidth;
                if (!width) return;
                frame.style.width = width + 'px';
                try { frame.contentWindow.postMessage({ type: 'set-viewport-width', width }, '*'); } catch (e) {}
            };

            sendWidth();
            if (window.htmlFrameResizeObserver) window.htmlFrameResizeObserver.disconnect();
            window.htmlFrameResizeObserver = new ResizeObserver(sendWidth);
            window.htmlFrameResizeObserver.observe(wrap);
        }

        // 忽略 iframe 内部上报的高度，保持预览框尺寸固定
        window.addEventListener('message', function(e) {
            if (e.data && e.data.type === 'iframe-height' && e.data.id) {
                const frame = document.getElementById(e.data.id);
                if (frame) frame.style.height = '300px';
            }
        });

        async function toggleFollow(userId) {
            if (!currentUser) { showMessage('请先登录', 'error'); return; }
            const btn = document.getElementById('follow-btn');

            const { data: existing, error: checkError } = await supabaseClient.from('follows')
                .select('id').eq('follower_id', currentUser.id).eq('following_id', userId).single();

            if (checkError && checkError.code !== 'PGRST116') { showMessage('操作失败：' + checkError.message, 'error'); return; }

            if (existing) {
                await supabaseClient.from('follows').delete().eq('id', existing.id);
                showMessage('已取消关注', 'success');
                btn.className = 'btn btn-primary';
                btn.textContent = '+ 关注';
            } else {
                const { error } = await supabaseClient.from('follows').insert([
                    { follower_id: currentUser.id, following_id: userId }
                ]);
                if (error) { showMessage('关注失败：' + error.message, 'error'); return; }
                showMessage('关注成功！', 'success');
                btn.className = 'btn btn-outline btn-following';
                btn.textContent = '已关注';
            }

            // 前端兜底：实时查询 follows 表计算粉丝数并更新显示
            // 防止数据库触发器未生效时粉丝数不更新
            try {
                const { count } = await supabaseClient.from('follows')
                    .select('id', { count: 'exact', head: true })
                    .eq('following_id', userId);
                const followersEl = document.querySelectorAll('.stat-label');
                followersEl.forEach(el => {
                    if (el.textContent === '粉丝') {
                        const numEl = el.previousElementSibling;
                        if (numEl && numEl.classList.contains('stat-num')) {
                            numEl.textContent = count || 0;
                        }
                    }
                });
            } catch (e) {}

            loadUserHomePage(userId);
        }

        function renderPost(post, options = {}) {
            const authorName = post.profiles?.username || '匿名';
            const authorAvatar = getResizedImageUrl(post.profiles?.avatar_url, 120);
            const firstChar = authorName.charAt(0);
            const fullImages = post.image_urls || [];
            const thumbImages = post.thumbnail_urls || [];
            const images = thumbImages.length > 0 ? thumbImages : fullImages;
            const authorId = post.profiles?.id;
            const canDelete = currentUser && post.user_id === currentUser.id && options.showDelete !== false;
            return `
                <div class="post" onclick="navigateDetail('${post.id}')">
                    <div class="post-header" ${authorId ? `onclick="navigateUserPage('${authorId}', event)"` : ''}>
                        ${authorAvatar ? `<div class="avatar"><img src="${authorAvatar}" alt="" loading="lazy" decoding="async"></div>` : `<div class="avatar">${firstChar}</div>`}
                        <div class="post-info">
                            <h3>${authorName}</h3>
                            <p>${formatTime(post.created_at)}</p>
                        </div>
                    </div>
                    <div class="post-title-text">${post.title}</div>
                    ${post.content_type === 'html' ? '' : `<div class="post-content">${post.content}</div>`}
                    ${images.length > 0 ? `<div class="post-images">${images.map((url, i) => renderLazyImg(getResizedImageUrl(url, 400), '图片', fullImages[i] || url, 200)).join('')}</div>` : ''}
                    <div class="post-footer">
                        <button onclick="toggleLike('${post.id}', event)">❤️ ${post.likes_count}</button>
                        <span>💬 ${post.comments_count} 评论</span>
                        ${canDelete ? `<button class="delete-btn" onclick="deletePost('${post.id}', event)">🗑️ 删除</button>` : ''}

        async function deletePost(postId, event) {
            if (event) event.stopPropagation();
            if (!confirm('确定要删除这条帖子吗？删除后无法恢复。')) return;
            const { error } = await supabaseClient.from('posts').delete().eq('id', postId).eq('user_id', currentUser.id);

            showMessage('删除成功', 'success');

                if (currentHomeTab === 'hot') loadHotPosts();
                else if (currentHomeTab === 'featured') loadFeaturedPosts();
                else loadPosts();

        async function openEditPostModal(postId, event) {
            if (event) event.stopPropagation();
            editPostId = postId;

            const { data: post, error } = await supabaseClient.from('posts')

        function renderEditPostImagesPreview() {
            const preview = document.getElementById('edit-post-images-preview');
            preview.innerHTML = editPostImages.map((url, i) => `
                <div class="img-preview-item" style="position:relative;width:60px;height:60px;">
                    <img src="${url}" style="width:60px;height:60px;border-radius:8px;object-fit:cover;">
                    <button style="position:absolute;top:-5px;right:-5px;background:#FF4757;color:white;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;" onclick="removeEditPostImage(${i}, event)">×</button>
                </div>
            `).join('');
        }

        function removeEditPostImage(index, event) {
            if (event) event.stopPropagation();
            editPostImages.splice(index, 1);
            renderEditPostImagesPreview();
        }

        async function handleEditPostImageUpload(event) {
            const files = event.target.files;
            if (!files || files.length === 0) return;

            for (const file of files) {
                let imageFile = file;
                try { imageFile = await compressImage(file, 800); } catch (e) { /* 用原图 */ }
                const ext = file.name.split('.').pop() || 'jpg';
                const filePath = `${currentUser.id}/edit_${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
                const { error: uploadError } = await supabaseClient.storage.from('posts').upload(filePath, imageFile);
                if (uploadError) { showMessage('图片上传失败', 'error'); continue; }
                const { data: urlData } = supabaseClient.storage.from('posts').getPublicUrl(filePath);
                editPostImages.push(urlData.publicUrl);
            }

            renderEditPostImagesPreview();
            event.target.value = '';
        }

        async function saveEditPost() {
            if (!editPostId || !currentUser) return;

            const title = document.getElementById('edit-post-title').value.trim();
            const content = document.getElementById('edit-post-content').value.trim();
            const ct = document.querySelector('#edit-content-type-selector .content-type-option.selected')?.dataset.type || 'text';

            if (!title) { showMessage('标题不能为空', 'error'); return; }

            const sanitizedTitle = sanitizeText(title);
            const sanitizedContent = sanitizeText(content);

            const imagesChanged = editPostImages.join(',') !== editPostOriginalImages;
            const updatePayload = {
                title: sanitizedTitle,
                content: sanitizedContent,
                content_type: ct,
                image_urls: editPostImages
            };
            // 图片有改动时清空缩略图，避免旧缩略图与新原图不匹配
            if (imagesChanged) updatePayload.thumbnail_urls = null;

            const { error } = await supabaseClient.from('posts')
                .update(updatePayload)
                .eq('id', editPostId)
                .eq('user_id', currentUser.id);

            if (error) { showMessage('保存失败：' + error.message, 'error'); return; }

            showMessage('帖子已更新！', 'success');
            closeEditPostModal();
            loadPostDetail(editPostId);
        }

        function selectReportReason(reason, btn) {
            selectedReportReason = reason;
            document.querySelectorAll('.report-reason-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');

        async function submitReport() {
            if (!reportPostId || !currentUser || !selectedReportReason) {
                showMessage('请选择举报原因', 'error'); return;
            }

            const detail = document.getElementById('report-detail').value.trim();
            const reasonText = selectedReportReason === '其他' ? detail : selectedReportReason;
            if (!reasonText) { showMessage('请填写详细说明', 'error'); return; }

            const isAdmin = isCurrentUserSuperAdmin();

            if (!isAdmin) {
                const { data: existing } = await supabaseClient.from('reports')
                    .select('id').eq('post_id', reportPostId).eq('user_id', currentUser.id).single();
                if (existing) { showMessage('您已举报过此帖子', 'error'); closeReportModal(); return; }
            } else {
                await supabaseClient.from('reports')
                    .delete().eq('post_id', reportPostId).eq('user_id', currentUser.id);
            }

            const { error } = await supabaseClient.from('reports')
                .insert([{ post_id: reportPostId, user_id: currentUser.id, reason: reasonText }]);
            if (error) { showMessage('举报失败：' + error.message, 'error'); return; }

            showMessage(isAdmin ? '管理员已举报此帖子' : '举报成功，我们会尽快处理', 'success');
            closeReportModal();
        }

        // ========== 公投审核系统 ==========

        async function loadTrialList() {
            const homeContent = document.getElementById('home-content');
            homeContent.innerHTML = `<div style="text-align:center;padding:20px;"><div style="font-size:20px;margin-bottom:10px;">⚖️</div>正在加载公审列表...</div>`;

            try {
                await loadPostTrialList(homeContent);
            } catch (err) {
                homeContent.innerHTML = `<div class="empty">加载失败：${err.message}</div>`;
            }
        }

        async function loadPostTrialList(homeContent) {
            const { data: trials, error } = await supabaseClient.rpc('get_active_trials');
            if (error) throw error;

            let html = `<div style="text-align:center;padding:15px 0 20px;">
                <div style="font-size:28px;">⚖️</div>
                <h3 style="color:#0A4D8C;margin:5px 0;">帖子公审庭</h3>
            </div>`;

            if (!trials || trials.length === 0) {
                html += `
                    <div style="text-align:center;padding:40px;">
                        <p style="color:#888;">当前没有待审核的帖子</p>
                        <p style="color:#999;font-size:13px;margin-top:10px;">被举报≥2次的帖子将自动进入公审</p>
                        <p style="color:#999;font-size:13px;">由超级管理员根据投票情况决定是否下架</p>
                    </div>
                `;
                homeContent.innerHTML = html;
                return;
            }

            // 获取当前用户已投票的记录
            let votedMap = {};
            if (currentUser) {
                const trialIds = trials.map(t => t.trial_id);
                const { data: votes } = await supabaseClient.from('trial_votes')
                    .select('trial_id, verdict')
                    .eq('user_id', currentUser.id)
                    .in('trial_id', trialIds);
                if (votes) votes.forEach(v => { votedMap[v.trial_id] = v.verdict; });
            }

            const activeCount = trials.filter(t => t.status === 'active').length;
            html += `<p style="color:#999;font-size:13px;margin-bottom:15px;">${trials.length} 个帖子等待处理${activeCount > 0 ? `（${activeCount} 个投票中）` : ''} · 超级管理员可直接处理</p>`;

            const isAdmin = isCurrentUserSuperAdmin();

            for (const t of trials) {
                const total = (t.violate_count || 0) + (t.clean_count || 0);
                const violatePct = total > 0 ? ((t.violate_count / total) * 100) : 50;
                const cleanPct = total > 0 ? ((t.clean_count / total) * 100) : 50;
                const myVote = votedMap[t.trial_id] || null;
                const authorName = t.author_username || '匿名';
                const firstChar = authorName.charAt(0);
                const avatarHtml = t.author_avatar_url
                    ? `<img src="${t.author_avatar_url}" alt="">`
                    : firstChar;

                const isActive = t.status === 'active';
                const isViolate = t.status === 'violate';
                const badgeText = isViolate ? '已判定违规，等待管理员处理' : '待审';
                const badgeStyle = isViolate ? 'background:#FF9500;' : '';

                html += `
                <div class="trial-card">
                    <div class="trial-card-header">
                        <div class="avatar">${avatarHtml}</div>
                        <div>
                            <div class="trial-card-author">${authorName}</div>
                            <div class="trial-card-time">${formatTime(t.created_at)} 被送审</div>
                        </div>
                        <span class="trial-badge" style="${badgeStyle}">${badgeText}</span>
                    </div>
                    <div class="trial-card-title">${escapeHtml(t.post_title || '')}</div>
                    <div class="trial-card-content">${escapeHtml(t.post_content || '')}</div>
                    ${t.post_image_urls && t.post_image_urls.length > 0 ? `
                        <div class="trial-card-images">
                            ${t.post_image_urls.slice(0, 4).map(url => renderLazyImg(url, '图片', url, null)).join('')}
                        </div>
                    ` : ''}
                    <div class="trial-vote-bar">
                        <div class="trial-vote-count">
                            <span class="violate-num">${t.violate_count || 0}</span> 违规 /
                            <span class="clean-num">${t.clean_count || 0}</span> 合规
                        </div>
                        <div class="trial-progress">
                            <div class="violate-bar" style="width:${violatePct}%"></div>
                            <div class="clean-bar" style="width:${cleanPct}%"></div>
                        </div>
                    </div>
                    <div class="trial-vote-btns">
                        ${currentUser && isActive ? `
                            <button class="btn-violate ${myVote === 'violate' ? 'voted' : ''}"
                                onclick="castTrialVote('${t.trial_id}', 'violate', this)"
                                ${myVote ? 'disabled' : ''}>
                                ${myVote === 'violate' ? '✓ 已投违规' : '🔥 违规'}
                            </button>
                            <button class="btn-clean ${myVote === 'clean' ? 'voted' : ''}"
                                onclick="castTrialVote('${t.trial_id}', 'clean', this)"
                                ${myVote ? 'disabled' : ''}>
                                ${myVote === 'clean' ? '✓ 已投合规' : '✅ 合规'}
                            </button>
                        ` : (!currentUser && isActive ? '<span style="color:#999;font-size:13px;">登录后可投票</span>' : '<span style="color:#999;font-size:13px;">投票已结束</span>')}
                    </div>
                    ${isAdmin && t.post_id ? `
                        <div class="trial-vote-btns" style="margin-top:10px;">
                            <button class="btn btn-danger" onclick="adminDeleteTrialPost('${t.trial_id}', event)">🚫 删除该帖子</button>
                            <button class="btn btn-outline" style="border-color:#999;color:#666;" onclick="adminKeepTrialPost('${t.trial_id}', event)">✅ 保留该帖子</button>
                        </div>
                    ` : ''}
                </div>`;
            }

            homeContent.innerHTML = html;
        }

        async function castTrialVote(trialId, verdict, btn) {
            if (!currentUser) { showMessage('请先登录', 'error'); return; }
            if (btn.disabled) return;

            btn.disabled = true;
            btn.textContent = '投票中...';

            const { data, error } = await supabaseClient.rpc('vote_trial', {
                p_trial_id: trialId,
                p_user_id: currentUser.id,
                p_verdict: verdict
            });

            if (error) {
                showMessage('投票失败：' + error.message, 'error');
                btn.disabled = false;
                btn.textContent = verdict === 'violate' ? '🔥 违规' : '✅ 合规';
                return;
            }

            if (data && data.error) {
                showMessage(data.error, 'error');
                btn.disabled = false;
                btn.textContent = verdict === 'violate' ? '🔥 违规' : '✅ 合规';
                return;
            }

            showMessage('投票成功！', 'success');
            // 刷新整个列表以获取最新计数
            loadTrialList();
        }

        async function adminDeleteTrialPost(trialId, event) {
            if (event) event.stopPropagation();
            if (!isCurrentUserSuperAdmin()) { showMessage('无权限', 'error'); return; }
            if (!confirm('确定要删除该帖子吗？删除后帖子将从首页/搜索/热榜/分类中移除，但保留在作者主页。')) return;

            try {
                const { data, error } = await supabaseClient.rpc('admin_delete_trial_post', {
                    p_trial_id: trialId,
                    admin_user_id: currentUser.id
                });
                if (error) throw error;
                if (data?.success) {
                    showMessage('已删除该帖子并结案', 'success');
                    loadTrialList();
                } else {
                    showMessage(data?.error || '操作失败', 'error');
                }
            } catch (e) {
                showMessage('操作失败：' + e.message, 'error');
            }
        }

        async function adminKeepTrialPost(trialId, event) {
            if (event) event.stopPropagation();
            if (!isCurrentUserSuperAdmin()) { showMessage('无权限', 'error'); return; }
            if (!confirm('确定要保留该帖子吗？帖子将保持正常显示。')) return;

            try {
                const { data, error } = await supabaseClient.rpc('resolve_trial', {
                    p_trial_id: trialId,
                    admin_user_id: currentUser.id
                });
                if (error) throw error;
                if (data?.success) {
                    showMessage('已保留该帖子', 'success');
                    loadTrialList();
                } else {
                    showMessage(data?.error || '操作失败', 'error');
                }
            } catch (e) {
                showMessage('操作失败：' + e.message, 'error');
            }
        }

        async function deleteComment(commentId, event) {
            if (event) event.stopPropagation();
            if (!confirm('确定要删除这条评论吗？')) return;
            const { error } = await supabaseClient.from('comments').delete().eq('id', commentId).eq('user_id', currentUser.id);
            if (error) { showMessage('删除失败：' + error.message, 'error'); return; }
            showMessage('评论已删除', 'success');
            if (currentDetailPostId) loadPostDetail(currentDetailPostId);
        }

        function toggleEditForm() {
            const form = document.getElementById('edit-form');
            form.style.display = form.style.display === 'block' ? 'none' : 'block';
        }

        async function handleAvatarUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            let imageFile = file;
            try { imageFile = await compressImage(file, 300); } catch (e) { /* 用原图 */ }
            const ext = 'jpg';
            const filePath = `${currentUser.id}/avatar_${Date.now()}.${ext}`;
            const { error: uploadError } = await supabaseClient.storage.from('posts').upload(filePath, imageFile);
            if (uploadError) { showMessage('头像上传失败：' + uploadError.message, 'error'); return; }
            const { data: urlData } = supabaseClient.storage.from('posts').getPublicUrl(filePath);
            const avatarUrl = urlData.publicUrl + '?t=' + Date.now();

            const { error } = await supabaseClient.from('profiles')
                .update({ avatar_url: avatarUrl }).eq('id', currentUser.id);
            if (error) { showMessage('更新头像失败：' + error.message, 'error'); return; }
            currentUser.avatar_url = avatarUrl;
            showMessage('头像更新成功！', 'success');
            updateNav();
            loadProfilePage();
        }

        async function saveProfile() {
            const username = document.getElementById('edit-username').value.trim();
            const bio = document.getElementById('edit-bio').value.trim();
            const newPassword = document.getElementById('edit-password').value;

            if (!username) { showMessage('昵称不能为空', 'error'); return; }

            // 更新 profile 信息
            const { error } = await supabaseClient.from('profiles')
                .update({ username, bio }).eq('id', currentUser.id);
            if (error) { showMessage('保存失败：' + error.message, 'error'); return; }

            currentUser.username = username;
            currentUser.bio = bio;

            // 如果有新密码，则更新密码
            if (newPassword) {
                if (newPassword.length < 6) {
                    showMessage('密码至少需要6位', 'error'); return;
                }
                const { error: pwdError } = await supabaseClient.auth.updateUser({ password: newPassword });
                if (pwdError) {
                    showMessage('密码修改失败：' + pwdError.message, 'error'); return;
                }
                showMessage('资料和密码都已保存成功！', 'success');
            } else {
                showMessage('保存成功！', 'success');
            }

            updateNav();
            loadProfilePage();
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
            if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
            return date.toLocaleDateString('zh-CN');
        }

        function spinner() {
            return '<div style="text-align:center;padding:20px;"><div style="display:inline-block;width:20px;height:20px;border:3px solid #0066FF;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;"></div></div>';
        }

        // 图片预览
        function openImagePreview(url, event) {
            if (event) event.stopPropagation();
            const overlay = document.getElementById('image-preview-overlay');
            const img = document.getElementById('image-preview-img');
            img.src = url;
            overlay.classList.add('show');
            // 推入历史记录，支持浏览器返回键关闭
            history.pushState({ preview: true }, '');
        }
        function closeImagePreview(event) {
            if (event && event.target.tagName === 'IMG') return;
            document.getElementById('image-preview-overlay').classList.remove('show');
        }
        // 浏览器返回键支持
        window.addEventListener('popstate', (e) => {
            const overlay = document.getElementById('image-preview-overlay');
            if (overlay.classList.contains('show')) {
                overlay.classList.remove('show');
                return;
            }
            const current = document.querySelector('.page:not(.hidden)');
            if (current && current.id === 'page-detail') {
                goBack();
            }
        });

        let splashHidden = false;
        function hideSplash() {
            if (splashHidden) return;
            splashHidden = true;
            const splash = document.getElementById('splash-screen');
            if (splash) splash.classList.add('hidden');
        }

        // 3秒后自动隐藏启动页
        setTimeout(hideSplash, 3000);

        // 启动页消失后检查公告
        async function checkAndShowAnnouncement() {
            try {
                const { data, error } = await supabaseClient
                    .from('site_content')
                    .select('content, updated_at')
                    .eq('key', 'announcement')
                    .single();

                if (error || !data) {
                    // 数据库里没有公告，隐藏弹窗
                    return;
                }

                const announcementContent = data.content || '';
                const cachedContent = localStorage.getItem('announcement_cached') || '';

                // 如果公告内容有变化，显示弹窗并更新缓存
                if (announcementContent !== cachedContent) {
                    const body = document.getElementById('announcement-body');
                    if (body) {
                        body.innerHTML = announcementContent.replace(/\n/g, '<br>');
                    }
                    const overlay = document.getElementById('announcement-overlay');
                    if (overlay) overlay.classList.add('show');
                    // 关闭时才缓存，避免还没看就缓存了
                }
            } catch (e) {
                console.error('检查公告失败:', e);
            }
        }

        function showAnnouncement() {
            const overlay = document.getElementById('announcement-overlay');
            if (overlay) overlay.classList.add('show');
        }

        function closeAnnouncement(e) {
            if (e) e.stopPropagation();
            const overlay = document.getElementById('announcement-overlay');
            if (overlay) overlay.classList.remove('show');
            // 关闭时缓存当前公告内容
            const body = document.getElementById('announcement-body');
            if (body) {
                const content = body.innerText || '';
                localStorage.setItem('announcement_cached', content);
            }
        }

        // 启动页消失后检查公告
        setTimeout(checkAndShowAnnouncement, 4000);

        // 滚动公告条
        let tickerPollTimer = null;
        async function loadTickerAnnouncement() {
            try {
                const { data, error } = await supabaseClient
                    .from('site_content')
                    .select('content')
                    .eq('key', 'announcement')
                    .single();
                if (error || !data) return;
                const text = (data.content || '').replace(/<[^>]*>/g, '').trim();
                const el = document.getElementById('ticker-content');
                if (el && text) {
                    el.textContent = text + '　·　' + text + '　·　';
                } else if (el) {
                    el.textContent = '欢迎来到散帅啤酒馆！在这里分享你的故事。';
                }
            } catch (e) {}
        }
        loadTickerAnnouncement();
        tickerPollTimer = setInterval(loadTickerAnnouncement, 60000);

        // 首页下拉刷新
        function initPullToRefresh() {
            const page = document.getElementById('page-home');
            const indicator = document.getElementById('home-pull-indicator');
            if (!page || !indicator) return;
            const icon = indicator.querySelector('.home-pull-icon');
            const text = indicator.querySelector('.home-pull-text');
            const content = document.getElementById('home-content');

            let startY = 0;
            let pulling = false;
            let refreshing = false;
            const threshold = 80;
            const maxPull = 120;

            function resetPull() {
                pulling = false;
                indicator.style.transform = '';
                if (content) content.style.transform = '';
                if (icon) icon.style.transform = '';
                if (text) text.textContent = '下拉刷新';
            }

            page.addEventListener('touchstart', (e) => {
                if (refreshing) return;
                const scrollTop = window.scrollY || document.documentElement.scrollTop || 0;
                if (scrollTop > 1) return;
                startY = e.touches[0].clientY;
                pulling = true;
            }, { passive: true });

            page.addEventListener('touchmove', (e) => {
                if (!pulling || refreshing) return;
                const scrollTop = window.scrollY || document.documentElement.scrollTop || 0;
                if (scrollTop > 1) { resetPull(); return; }
                const delta = e.touches[0].clientY - startY;
                if (delta <= 0) { resetPull(); return; }
                if (e.cancelable) e.preventDefault();
                const pull = Math.min(delta * 0.5, maxPull);
                indicator.style.transform = `translateY(${pull + 70}px)`;
                if (content) content.style.transform = `translateY(${pull}px)`;
                if (icon) icon.style.transform = `rotate(${Math.min(delta, 180)}deg)`;
                if (text) text.textContent = pull >= threshold ? '释放刷新' : '下拉刷新';
            }, { passive: false });

            page.addEventListener('touchend', () => {
                if (!pulling || refreshing) return;
                pulling = false;
                const match = indicator.style.transform.match(/translateY\((\d+(?:\.\d+)?)px\)/);
                const currentPull = match ? parseFloat(match[1]) - 70 : 0;
                if (currentPull >= threshold) {
                    refreshing = true;
                    indicator.classList.add('refreshing');
                    if (icon) icon.textContent = '⟳';
                    if (text) text.textContent = '刷新中...';
                    indicator.style.transform = `translateY(${threshold + 70}px)`;
                    if (content) content.style.transform = `translateY(${threshold}px)`;

                    homeDomCache = null;
                    homeCacheTime = 0;
                    window.scrollTo({ top: 0, behavior: 'auto' });
                    if (currentHomeTab === 'hot') loadHotPosts();
                    else if (currentHomeTab === 'featured') loadFeaturedPosts();
                    else loadPosts();

                    setTimeout(() => {
                        refreshing = false;
                        indicator.classList.remove('refreshing');
                        if (icon) icon.textContent = '↓';
                        resetPull();
                    }, 800);
                } else {
                    resetPull();
                }
            });
        }

        async function checkAuth() {
            const banned = await checkIpBanned();
            if (banned) {
                showBannedScreen();
                return;
            }

            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                currentUser = user;
                await loadUserProfile();
                await trackUserIp();
                startMessagePolling();
            }
            updateNav();
            loadUserCount();
            loadPosts();
            initPullToRefresh();
        }

        checkAuth();
    </script>
